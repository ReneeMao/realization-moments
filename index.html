<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realization Moments</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #F5F0E8; font-family: 'DM Serif Display', Georgia, serif; }
    textarea { font-family: 'DM Sans', sans-serif; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #DDD5C8; border-radius: 3px; }
    a { color: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── PALETTE ─── */
    const C = {
      kiln:"#F5F0E8", slip:"#EDE6D9", bisque:"#E3D9CB",
      charcoal:"#3A3530", ash:"#8A8278", stone:"#6B645B",
      celadon:"#9DB4A0", celadonD:"#6E9273", celadonP:"#C7D6C5",
      terra:"#C8886E", terraP:"#E4C4B4",
      ochre:"#D4B87A", ochreP:"#E8DCC0",
      white:"#FDFBF7", cream:"#F9F5ED", line:"#DDD5C8",
      glow:"0 2px 20px rgba(58,53,48,0.06)",
      lift:"0 6px 28px rgba(58,53,48,0.10)"
    };

    /* ─── DEMO RESPONSES ─── */
    // Pre-written responses that capture the tool's reflective, tentative voice.
    // In a production build these would come from a backend calling Claude.
    const DR = {
      s1: [
        "There's something that stayed with you in what you described — not because it was loud or dramatic, but because it kept returning. It sounds like a moment where two things were true at once, and you're still working out how to hold both. What part of this feels most like the center of it for you?",
        "Reading what you wrote, I notice a kind of layering — what happened on the surface, and then something quieter underneath it that seems harder to name. The context you're describing seems like it matters: not just the event itself, but the conditions it was happening inside. What feels most alive or most stuck when you sit with this?",
        "There's a quality of ongoing-ness in what you've shared — like this isn't quite finished, like it keeps meaning something new each time you return to it. I wonder if there's a particular moment, or a particular person, or a particular feeling that this keeps coming back to. Which part feels like it's asking for more attention?",
        "What you've described has this quality of something that looked like one thing from the outside and was quietly something else from inside. That gap — between how something appeared and how it actually felt — seems important here. Could you say more about what was happening for you in that space between?",
      ],
      needs_more: "Thank you for bringing this here. I'd love to understand a bit more — could you describe a specific moment when this showed up for you? Even a small, concrete scene: where you were, what was happening around you, what it felt like in that moment.",
      questions: [
        {"label":"Another side","question":"You've described this in a particular way — but I'm curious whether there have been moments, even small ones, where a different version felt more true. Were there times when this didn't quite fit the pattern you've been carrying?"},
        {"label":"The bigger picture","question":"When you step back a little, do any larger conditions come to mind — expectations from family, cultural pressures, the weight of how certain things are supposed to look or go? I wonder if any of those were quietly present in what you described."},
        {"label":"A moment that didn't fit","question":"Was there a moment — perhaps easy to overlook — where something felt different from the usual story? A time when you acted, felt, or understood things in a way that surprised you, or felt more like what you'd want?"},
        {"label":"What matters most","question":"Underneath all of this, what do you think you've been reaching for or trying to protect? What does this experience say about what you care about most deeply?"},
      ],
      review: [
        "It seems like you've been holding something that hasn't quite had a name yet.",
        "There may be more than one story available here — not all of them point in the same direction.",
        "Something in what you described feels connected to conditions that are larger than this moment alone.",
        "It sounds like what may be shifting is less what happened and more how you understand what it meant.",
        "It seems like there's something you've been trying to protect or preserve, even when that hasn't been easy.",
      ],
      output: {
        reflective: "You described a moment — or a pattern — that has stayed with you longer than you might have expected. Not because it was dramatic, but because it kept meaning something new each time it returned. There's a quality of being between things in what you shared: between how something appeared and how it actually felt, between what was expected and what was quietly wanted. The conditions you named — the context, the relationships, the weight of certain expectations — don't seem incidental. They seem like part of what made this moment matter in the way it has. What seems to stay with me is the care underneath it all: a reaching toward something, even when the language for it wasn't quite there yet. This is a draft. Yours to revise as your understanding continues to shift.",
        firstperson: "I've been sitting with this longer than I realized until I started writing it down. What happened felt ordinary from the outside, and in another way it reorganized something I thought I already understood. I notice I've been telling a particular story about it — one where I was mostly receiving what was happening around me, responding to what was expected. But there were moments where something else was also true. Where I knew something, or wanted something, or felt something that didn't quite fit that version. I don't think I've found the right language for all of it yet. But I'm starting to see that what I was carrying wasn't only mine — that the context shaped it in ways I'm still learning to name. And that changes something about how it sits.",
        values: "What seems to matter most, reading through this, is a sense of authorship — being able to name your own experience, rather than having it named by the conditions around you. There's something about belonging that runs through this, though not a simple kind. More like the kind that holds contradiction without requiring it to be resolved. What may be shifting is the story you've been using to make sense of this moment — not because that story was wrong, but because it may have been narrower than the experience itself. What seems to have stayed, through all of it, is a quality of care: for honesty, for the people who matter, for not losing something essential in the process of navigating what's hard.",
      },
    };

    async function demoAsk(type) {
      await new Promise(r => setTimeout(r, 1600 + Math.random() * 1200));
      if (type === 's1') {
        return Math.random() < 0.12
          ? `[NEEDS_MORE] ${DR.needs_more}`
          : `[READY] ${DR.s1[Math.floor(Math.random() * DR.s1.length)]}`;
      }
      if (type === 'deep') return `[READY] ${DR.s1[0]}`;
      if (type === 'questions') return JSON.stringify(DR.questions);
      if (type === 'review') return JSON.stringify(DR.review);
      if (type === 'reflective') return DR.output.reflective;
      if (type === 'firstperson') return DR.output.firstperson;
      if (type === 'values') return DR.output.values;
      return '';
    }

    /* ─── STORAGE (localStorage) ─── */
    async function sv(data) {
      try {
        const id = `rm:${Date.now()}`;
        localStorage.setItem(id, JSON.stringify({ ...data, id }));
        return id;
      } catch { return null; }
    }
    async function ldAll() {
      try {
        const items = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith('rm:')) {
            try { const v = localStorage.getItem(k); if (v) items.push(JSON.parse(v)); } catch {}
          }
        }
        return items.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      } catch { return []; }
    }
    async function rm(id) { try { localStorage.removeItem(id); } catch {} }

    function expTxt(d) {
      const L = [];
      L.push(`REALIZATION MOMENTS\n${new Date(d.timestamp).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}\n\nStarting point: ${d.entryCard}\n`);
      L.push(`My Story\n${d.userStory}\n`);
      L.push(`What I Heard Back\n${d.stage1Response}\n`);
      L.push(`Going Deeper\n${d.focalPointText}\n`);
      if (d.cardResponses) {
        L.push('Reflections');
        Object.entries(d.cardResponses).forEach(([l,t])=>{ if(t?.trim()) L.push(`\n◆ ${l}\n${t}`); });
        L.push('');
      }
      if (d.confirmedStatements?.length) {
        L.push('What Stayed True');
        d.confirmedStatements.forEach(s => L.push(`• ${s}`));
        L.push('');
      }
      if (d.outputText) L.push(`My Artifact\n${d.outputText}\n`);
      L.push('This is yours. Partial, revisable, not a record of truth.');
      return L.join('\n');
    }
    function dlF(t, fn) {
      const b = new Blob([t],{type:'text/plain;charset=utf-8'}),
            u = URL.createObjectURL(b),
            a = document.createElement('a');
      a.href = u; a.download = fn; a.click(); URL.revokeObjectURL(u);
    }

    /* ─── EVOLVING POT SVG ─── */
    function Pot({ phase = 'clay', size = 60 }) {
      const w = size, h = size;
      const body = (fill, stroke) => (
        <path d={`M${w*.28} ${h*.38}C${w*.25} ${h*.38} ${w*.22} ${h*.44} ${w*.22} ${h*.53}C${w*.22} ${h*.69} ${w*.31} ${h*.81} ${w*.5} ${h*.81}C${w*.69} ${h*.81} ${w*.78} ${h*.69} ${w*.78} ${h*.53}C${w*.78} ${h*.44} ${w*.75} ${h*.38} ${w*.72} ${h*.38}`}
          fill={fill} stroke={stroke} strokeWidth="1.2"/>
      );
      const rim = (fill, stroke) => (
        <ellipse cx={w*.5} cy={h*.38} rx={w*.22} ry={h*.06} fill={fill} stroke={stroke} strokeWidth="1.2"/>
      );

      if (phase === 'clay') return (
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none">
          <ellipse cx={w*.5} cy={h*.65} rx={w*.3} ry={h*.22} fill={C.bisque} stroke={C.terra} strokeWidth="1" strokeDasharray="3 2" opacity="0.7"/>
          <text x={w*.5} y={h*.68} textAnchor="middle" fontSize={h*.13} fill={C.ash} fontFamily="'DM Sans',sans-serif" opacity="0.5">~</text>
        </svg>
      );

      if (phase === 'shaped') return (
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none">
          {body(C.terraP, C.terra)}{rim(C.terraP, C.terra)}
          <path d={`M${w*.26} ${h*.5}Q${w*.5} ${h*.52} ${w*.74} ${h*.5}`} stroke={C.terra} strokeWidth="0.5" opacity="0.4"/>
          <path d={`M${w*.24} ${h*.6}Q${w*.5} ${h*.62} ${w*.76} ${h*.6}`} stroke={C.terra} strokeWidth="0.5" opacity="0.3"/>
        </svg>
      );

      if (phase === 'bisque') return (
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none">
          {body(C.terraP, C.terra)}{rim(C.terraP, C.terra)}
          <path d={`M${w*.35} ${h*.2}Q${w*.37} ${h*.12} ${w*.4} ${h*.15}Q${w*.43} ${h*.18} ${w*.42} ${h*.1}`} stroke={C.ochre} strokeWidth="0.8" opacity="0.4" fill="none"/>
          <path d={`M${w*.58} ${h*.22}Q${w*.6} ${h*.14} ${w*.63} ${h*.17}Q${w*.66} ${h*.2} ${w*.64} ${h*.08}`} stroke={C.ochre} strokeWidth="0.8" opacity="0.3" fill="none"/>
        </svg>
      );

      if (phase === 'glazed') return (
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none" style={{filter:'drop-shadow(0 2px 6px rgba(157,180,160,0.25))'}}>
          {body(C.terraP, C.terra)}{rim(C.terraP, C.terra)}
          <path d={`M${w*.34} ${h*.38}C${w*.34} ${h*.38} ${w*.32} ${h*.48} ${w*.34} ${h*.52}C${w*.36} ${h*.56} ${w*.38} ${h*.54} ${w*.38} ${h*.5}C${w*.38} ${h*.46} ${w*.36} ${h*.42} ${w*.34} ${h*.38}Z`} fill={C.celadon} opacity="0.65"/>
          <path d={`M${w*.6} ${h*.38}C${w*.6} ${h*.38} ${w*.63} ${h*.45} ${w*.63} ${h*.5}C${w*.63} ${h*.55} ${w*.6} ${h*.57} ${w*.59} ${h*.52}C${w*.58} ${h*.47} ${w*.6} ${h*.38} ${w*.6} ${h*.38}Z`} fill={C.celadon} opacity="0.55"/>
          <path d={`M${w*.48} ${h*.37}C${w*.48} ${h*.37} ${w*.47} ${h*.42} ${w*.48} ${h*.44}C${w*.49} ${h*.46} ${w*.5} ${h*.44} ${w*.5} ${h*.42}`} fill={C.celadon} opacity="0.45"/>
        </svg>
      );

      // blooming
      return (
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none" style={{filter:'drop-shadow(0 3px 10px rgba(157,180,160,0.3))'}}>
          {body(C.terraP, C.terra)}{rim(C.terraP, C.terra)}
          <path d={`M${w*.34} ${h*.38}C${w*.34} ${h*.38} ${w*.32} ${h*.48} ${w*.34} ${h*.52}C${w*.36} ${h*.56} ${w*.38} ${h*.54} ${w*.38} ${h*.5}C${w*.38} ${h*.46} ${w*.36} ${h*.42} ${w*.34} ${h*.38}Z`} fill={C.celadon} opacity="0.6"/>
          <path d={`M${w*.6} ${h*.38}C${w*.6} ${h*.38} ${w*.63} ${h*.45} ${w*.63} ${h*.5}C${w*.63} ${h*.55} ${w*.6} ${h*.57} ${w*.59} ${h*.52}C${w*.58} ${h*.47} ${w*.6} ${h*.38} ${w*.6} ${h*.38}Z`} fill={C.celadon} opacity="0.5"/>
          <path d={`M${w*.5} ${h*.36}C${w*.5} ${h*.36} ${w*.49} ${h*.22} ${w*.5} ${h*.14}`} stroke={C.celadonD} strokeWidth="1.3" strokeLinecap="round"/>
          <ellipse cx={w*.44} cy={h*.18} rx={w*.06} ry={h*.035} fill={C.celadon} transform={`rotate(-25 ${w*.44} ${h*.18})`}/>
          <ellipse cx={w*.56} cy={h*.2} rx={w*.06} ry={h*.035} fill={C.celadonP} transform={`rotate(20 ${w*.56} ${h*.2})`}/>
          <circle cx={w*.5} cy={h*.1} r={w*.04} fill={C.ochre} opacity="0.8"/>
          {[0,72,144,216,288].map((a,i) => (
            <ellipse key={i} cx={w*.5} cy={h*.1} rx={w*.025} ry={w*.05} fill={C.ochreP} transform={`rotate(${a} ${w*.5} ${h*.1})`} opacity="0.7"/>
          ))}
        </svg>
      );
    }

    /* ─── PROGRESS BAR ─── */
    const PHASES = [
      {label:'Clay'}, {label:'Shaped'}, {label:'Fired'}, {label:'Glazed'}, {label:'Blooming'}
    ];
    function stageIdx(s) {
      return {landing:0, entry:0, stage1:1, stage3:2, stage4:3, stage5:4, artifact:4, closing:4}[s] ?? 0;
    }
    function Progress({ stage }) {
      const idx = stageIdx(stage);
      return (
        <div style={{display:'flex',alignItems:'center',marginBottom:24,padding:'0 4px'}}>
          {PHASES.map((p,i) => (
            <React.Fragment key={i}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:i<=idx?C.celadon:C.line,transition:'background 0.4s',boxShadow:i===idx?`0 0 6px ${C.celadon}66`:'none'}}/>
                <span style={{fontSize:9,color:i<=idx?C.celadonD:C.ash,fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap'}}>{p.label}</span>
              </div>
              {i < 4 && <div style={{flex:1,height:1,background:i<idx?C.celadon:C.line,margin:'0 4px',marginBottom:14,transition:'background 0.4s'}}/>}
            </React.Fragment>
          ))}
        </div>
      );
    }

    /* ─── SHARED UI ─── */
    function FadeIn({ children, delay = 0, style = {} }) {
      const [v, setV] = useState(false);
      useEffect(() => { const t = setTimeout(() => setV(true), delay); return () => clearTimeout(t); }, [delay]);
      return (
        <div style={{opacity:v?1:0,transform:v?'translateY(0)':'translateY(8px)',transition:'opacity 0.5s,transform 0.5s',...style}}>
          {children}
        </div>
      );
    }

    function Dots() {
      return (
        <div style={{display:'flex',gap:6,alignItems:'center',padding:'28px 0'}}>
          {[0,1,2].map(i => (
            <div key={i} style={{width:7,height:7,borderRadius:'50%',background:C.celadon,animation:`dp 1.2s ease ${i*.2}s infinite`}}/>
          ))}
          <style>{`@keyframes dp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}`}</style>
        </div>
      );
    }

    function Btn({ children, onClick, v = 'primary', disabled, style = {} }) {
      const base = {padding:'10px 22px',borderRadius:20,border:'none',fontSize:13,fontFamily:"'DM Serif Display',Georgia,serif",cursor:disabled?'not-allowed':'pointer',transition:'all 0.2s',opacity:disabled?.4:1,...style};
      const vs = {
        primary: {background:C.celadon,color:C.white,fontWeight:500},
        secondary: {background:'transparent',color:C.charcoal,border:`1.5px solid ${C.line}`},
        soft: {background:C.slip,color:C.charcoal},
      };
      return <button style={{...base,...vs[v]}} onClick={onClick} disabled={disabled}>{children}</button>;
    }

    function TA({ value, onChange, placeholder, minH = 120 }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) { ref.current.style.height = 'auto'; ref.current.style.height = Math.max(minH, ref.current.scrollHeight) + 'px'; }
      }, [value, minH]);
      return (
        <textarea ref={ref} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
          style={{width:'100%',minHeight:minH,padding:16,borderRadius:14,border:`1.5px solid ${C.line}`,background:C.white,color:C.charcoal,fontSize:15,lineHeight:1.7,fontFamily:"'DM Sans',sans-serif",resize:'none',outline:'none',boxSizing:'border-box',transition:'border-color 0.2s'}}
          onFocus={e=>e.target.style.borderColor=C.celadon}
          onBlur={e=>e.target.style.borderColor=C.line}
        />
      );
    }

    function Tag({ children, color = C.celadon }) {
      return (
        <span style={{display:'inline-block',padding:'2px 10px',borderRadius:12,background:color+'18',color:color,fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',fontFamily:"'DM Sans',sans-serif",marginBottom:4}}>
          {children}
        </span>
      );
    }

    function Sep() {
      return <div style={{width:32,height:1,background:`linear-gradient(to right, ${C.celadon}, transparent)`,margin:'16px 0'}}/>;
    }

    /* ─── ENTRY CARDS ─── */
    const CARDS = [
      {label:'A moment I keep thinking about', nudge:"What happened? Where were you? You don't need to explain why it matters yet."},
      {label:'A pattern I\'ve been noticing', nudge:"When does it show up? What does it look like? You don't need to have it figured out."},
      {label:'Something that feels different lately', nudge:"What feels different about you, or how you see things? Even something subtle counts."},
      {label:'Something someone said that stayed with me', nudge:"What did they say? What was the situation? You don't need to know why it stuck."},
      {label:'Two parts of me want different things', nudge:"What does each part want? What does it feel like to be in between?"},
    ];

    /* ─── JOURNEY ARTIFACT ─── */
    function Journey({ data, onEdit, onExport }) {
      const [exp, setExp] = useState(null);
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(data.outputText || '');
      useEffect(() => { setDraft(data.outputText || ''); }, [data.outputText]);

      const secs = [
        {k:'story', icon:'✦', t:'Where I started', sub:data.entryCard, body:data.userStory},
        {k:'heard', icon:'◇', t:'What I heard back', body:data.stage1Response},
        {k:'deeper', icon:'↳', t:'Going deeper', body:data.focalPointText},
      ];
      const ce = data.cardResponses ? Object.entries(data.cardResponses).filter(([,v]) => v?.trim()) : [];
      if (ce.length) secs.push({k:'cards', icon:'❋', t:'Reflections', cards:ce});
      if (data.confirmedStatements?.length) secs.push({k:'conf', icon:'◈', t:'What stayed true', stmts:data.confirmedStatements});
      const outLabel = {reflective:'Looking back', firstperson:'In my words', values:'What matters now'}[data.outputType] || 'Your artifact';

      return (
        <div style={{background:C.cream,borderRadius:22,boxShadow:C.lift,overflow:'hidden',border:`1px solid ${C.line}`}}>
          <div style={{background:`linear-gradient(135deg, ${C.celadonP}66, ${C.slip})`,padding:'20px 20px 16px',display:'flex',alignItems:'center',gap:12}}>
            <Pot phase="blooming" size={44}/>
            <div>
              <Tag color={C.celadonD}>Realization Moments</Tag>
              <div style={{fontSize:12,color:C.ash,fontFamily:"'DM Sans',sans-serif"}}>{new Date(data.timestamp).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
            </div>
          </div>

          <div style={{padding:'4px 0'}}>
            {secs.map((s, i) => {
              const open = exp === s.k;
              return (
                <div key={s.k}>
                  <button onClick={() => setExp(open ? null : s.k)}
                    style={{width:'100%',textAlign:'left',background:'transparent',border:'none',cursor:'pointer',padding:'11px 20px',fontFamily:"'DM Serif Display',Georgia,serif",display:'flex',alignItems:'center',gap:11,transition:'background 0.15s'}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.slip+'88'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:16,flexShrink:0}}>
                      <span style={{fontSize:11,color:C.celadon}}>{s.icon}</span>
                      {i < secs.length-1 && <div style={{width:1,height:5,background:C.line,marginTop:2}}/>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:C.charcoal}}>{s.t}</div>
                      {s.sub && <div style={{fontSize:11,color:C.ash,fontFamily:"'DM Sans',sans-serif"}}>{s.sub}</div>}
                    </div>
                    <span style={{fontSize:13,color:C.ash,transform:open?'rotate(180deg)':'',transition:'transform 0.2s'}}>▾</span>
                  </button>
                  {open && (
                    <div style={{padding:'2px 20px 12px 47px',animation:'fadeSlide 0.3s ease'}}>
                      {s.body && <p style={{fontSize:13,lineHeight:1.75,color:C.charcoal,margin:0,fontFamily:"'DM Sans',sans-serif"}}>{s.body}</p>}
                      {s.cards?.map(([l,t],j) => (
                        <div key={j} style={{marginBottom:j<s.cards.length-1?10:0}}>
                          <Tag color={C.celadonD}>{l}</Tag>
                          <p style={{fontSize:13,lineHeight:1.75,color:C.charcoal,margin:'4px 0 0',fontFamily:"'DM Sans',sans-serif"}}>{t}</p>
                        </div>
                      ))}
                      {s.stmts?.map((st,j) => (
                        <div key={j} style={{display:'flex',gap:7,alignItems:'flex-start',marginBottom:4}}>
                          <span style={{color:C.celadon,fontSize:8,marginTop:6}}>●</span>
                          <p style={{fontSize:13,lineHeight:1.7,color:C.charcoal,margin:0,fontFamily:"'DM Sans',sans-serif"}}>{st}</p>
                        </div>
                      ))}
                    </div>
                  )}
                  {i < secs.length-1 && !open && <div style={{marginLeft:28,width:1,height:3,background:C.line}}/>}
                </div>
              );
            })}
          </div>

          <div style={{borderTop:`1px solid ${C.line}`,padding:'18px 20px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <Tag color={C.terra}>{outLabel}</Tag>
            </div>
            {editing ? (
              <div>
                <TA value={draft} onChange={setDraft} minH={80}/>
                <div style={{display:'flex',gap:6,marginTop:8}}>
                  <Btn v="soft" onClick={()=>{onEdit(draft);setEditing(false);}} style={{fontSize:11,padding:'5px 12px'}}>Save</Btn>
                  <Btn v="secondary" onClick={()=>{setDraft(data.outputText);setEditing(false);}} style={{fontSize:11,padding:'5px 12px'}}>Cancel</Btn>
                </div>
              </div>
            ) : (
              <div style={{background:C.white,borderRadius:14,padding:16,borderLeft:`3px solid ${C.celadon}`}}>
                <p style={{fontSize:14,lineHeight:1.8,color:C.charcoal,margin:0,whiteSpace:'pre-wrap',fontFamily:"'DM Sans',sans-serif"}}>{data.outputText}</p>
              </div>
            )}
            <p style={{fontSize:11,color:C.ash,fontStyle:'italic',margin:'8px 0 10px',fontFamily:"'DM Sans',sans-serif"}}>A draft. Yours to change.</p>
            <div style={{display:'flex',gap:6}}>
              {!editing && <Btn v="secondary" onClick={()=>setEditing(true)} style={{fontSize:11,padding:'5px 11px'}}>Edit</Btn>}
              <Btn v="secondary" onClick={()=>navigator.clipboard?.writeText(data.outputText)} style={{fontSize:11,padding:'5px 11px'}}>Copy</Btn>
              <Btn v="secondary" onClick={onExport} style={{fontSize:11,padding:'5px 11px'}}>Export .txt</Btn>
            </div>
          </div>
          <style>{`@keyframes fadeSlide{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}`}</style>
        </div>
      );
    }

    /* ─── HISTORY VIEW ─── */
    function Hist({ items, onBack, onView, onDel }) {
      if (!items.length) return (
        <div style={{textAlign:'center',padding:'48px 16px'}}>
          <Pot phase="clay" size={48}/>
          <p style={{color:C.ash,fontSize:13,margin:'12px 0 16px',fontFamily:"'DM Sans',sans-serif"}}>No reflections yet.</p>
          <Btn v="secondary" onClick={onBack}>Back</Btn>
        </div>
      );
      return (
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
            <h2 style={{fontSize:17,fontWeight:400,margin:0}}>Past reflections</h2>
            <Btn v="secondary" onClick={onBack} style={{fontSize:11,padding:'5px 11px'}}>Back</Btn>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {items.map((r,i) => (
              <FadeIn key={r.id} delay={i*35}>
                <div style={{background:C.cream,borderRadius:14,padding:'12px 14px',boxShadow:C.glow,border:`1px solid ${C.line}`,display:'flex',alignItems:'center',gap:10}}>
                  <Pot phase="blooming" size={28}/>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:13,margin:'0 0 2px',color:C.charcoal}}>{r.entryCard}</p>
                    <p style={{fontSize:11,color:C.ash,margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'DM Sans',sans-serif"}}>{r.userStory?.substring(0,60)}…</p>
                  </div>
                  <Btn v="soft" onClick={()=>onView(r)} style={{fontSize:10,padding:'4px 10px'}}>View</Btn>
                  <button onClick={()=>onDel(r.id)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.ash,fontSize:16,lineHeight:1}}>×</button>
                </div>
              </FadeIn>
            ))}
          </div>
        </div>
      );
    }

    /* ─── MAIN APP ─── */
    function App() {
      const [stage, setStage] = useState('landing');
      const [selC, setSC] = useState(null);
      const [story, setStory] = useState('');
      const [s1, setS1] = useState('');
      const [focal, setFocal] = useState('');
      const [rC, setRC] = useState([]);
      const [cR, setCR] = useState({});
      const [oC, setOC] = useState(null);
      const [rvS, setRvS] = useState([]);
      const [rvM, setRvM] = useState({});
      const [oT, setOT] = useState(null);
      const [oTx, setOTx] = useState('');
      const [ld, setLd] = useState(false);
      const [past, setPast] = useState([]);
      const [vw, setVw] = useState(null);
      const [svd, setSvd] = useState(null);
      const [nm, setNm] = useState(false);
      const [dR, setDR] = useState('');
      const [dT, setDT] = useState('');
      const sr = useRef(null);

      useEffect(() => { sr.current?.scrollTo({top:0,behavior:'smooth'}); }, [stage]);
      useEffect(() => { ldAll().then(setPast); }, []);

      const reset = useCallback(() => {
        setSC(null); setStory(''); setS1(''); setFocal(''); setRC([]); setCR({});
        setOC(null); setRvS([]); setRvM({}); setOT(null); setOTx('');
        setSvd(null); setVw(null); setNm(false); setDR(''); setDT('');
      }, []);

      const sd = useCallback(() => ({
        timestamp: Date.now(),
        entryCard: selC?.label,
        userStory: story,
        stage1Response: s1,
        focalPointText: focal,
        cardResponses: cR,
        confirmedStatements: rvS.filter((_,i) => rvM[i]==='fits' || rvM[i]==='notquite'),
        outputType: oT,
        outputText: oTx,
      }), [selC, story, s1, focal, cR, rvS, rvM, oT, oTx]);

      const W = {minHeight:'100vh',background:C.kiln,fontFamily:"'DM Serif Display',Georgia,serif",color:C.charcoal,display:'flex',justifyContent:'center',overflowY:'auto'};
      const I = {width:'100%',maxWidth:560,padding:'32px 18px 64px'};

      /* LANDING */
      if (stage === 'landing') return (
        <div style={W} ref={sr}><div style={I}>
          <FadeIn>
            <div style={{textAlign:'center',marginBottom:32}}>
              <Pot phase="clay" size={64}/>
              <h1 style={{fontSize:21,fontWeight:400,margin:'14px 0 8px',letterSpacing:'-0.01em'}}>Realization Moments</h1>
              <p style={{color:C.ash,fontSize:13,lineHeight:1.6,maxWidth:320,margin:'0 auto',fontFamily:"'DM Sans',sans-serif"}}>
                A space to stay with an experience<br/>long enough to see it differently.
              </p>
            </div>
          </FadeIn>

          <FadeIn delay={80}>
            <div style={{background:C.cream,borderRadius:18,padding:'16px',boxShadow:C.glow,marginBottom:12,border:`1px solid ${C.line}`}}>
              <p style={{fontSize:13,lineHeight:1.7,marginBottom:12,fontFamily:"'DM Sans',sans-serif"}}>
                Explore an experience at your own pace. Leave with something you can keep and revise.
              </p>
              <Sep/>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:6}}>
                <Tag color={C.stone}>Not therapy</Tag>
                <Tag color={C.stone}>Not crisis support</Tag>
                <Tag color={C.stone}>No tracking</Tag>
              </div>
              <p style={{fontSize:11,color:C.ash,fontFamily:"'DM Sans',sans-serif",margin:'6px 0 0'}}>Avoid identifying details. All outputs are drafts.</p>
            </div>
          </FadeIn>

          <FadeIn delay={140}>
            <div style={{background:C.terraP+'66',borderRadius:12,padding:'9px 14px',fontSize:11,lineHeight:1.6,marginBottom:12,fontFamily:"'DM Sans',sans-serif"}}>
              In crisis: <strong>988</strong> (call/text) · <strong>741741</strong> (text HOME) ·{' '}
              <a href="https://findahelpline.com" target="_blank" rel="noreferrer" style={{color:C.celadonD}}>findahelpline.com</a>
            </div>
          </FadeIn>

          <FadeIn delay={190}>
            <div style={{background:C.slip,borderRadius:12,padding:'8px 14px',fontSize:11,lineHeight:1.55,marginBottom:22,fontFamily:"'DM Sans',sans-serif",color:C.stone,border:`1px dashed ${C.line}`}}>
              ✦ Demo — responses are carefully pre-written to simulate the reflection experience.
            </div>
          </FadeIn>

          <FadeIn delay={230}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
              <Btn onClick={()=>{reset();setStage('entry');}} style={{padding:'11px 44px',fontSize:14,borderRadius:24}}>Begin</Btn>
              {past.length > 0 && (
                <Btn v="secondary" onClick={()=>setStage('history')} style={{fontSize:12}}>
                  Past reflections{' '}
                  <span style={{background:C.celadon+'22',padding:'1px 7px',borderRadius:10,fontSize:11,marginLeft:4,color:C.celadonD}}>{past.length}</span>
                </Btn>
              )}
            </div>
          </FadeIn>
        </div></div>
      );

      /* HISTORY */
      if (stage === 'history') {
        if (vw) return (
          <div style={W} ref={sr}><div style={I}>
            <FadeIn>
              <Btn v="secondary" onClick={()=>setVw(null)} style={{fontSize:11,padding:'5px 11px',marginBottom:12}}>← Back</Btn>
              <Journey data={vw}
                onEdit={async t => {
                  const u = {...vw, outputText:t};
                  setVw(u);
                  try { localStorage.setItem(u.id, JSON.stringify(u)); } catch {}
                  setPast(await ldAll());
                }}
                onExport={()=>dlF(expTxt(vw),`reflection-${new Date(vw.timestamp).toISOString().slice(0,10)}.txt`)}
              />
            </FadeIn>
          </div></div>
        );
        return (
          <div style={W} ref={sr}><div style={I}>
            <Hist items={past} onBack={()=>setStage('landing')} onView={r=>setVw(r)} onDel={async id=>{await rm(id);setPast(await ldAll());}}/>
          </div></div>
        );
      }

      /* ENTRY */
      if (stage === 'entry') return (
        <div style={W} ref={sr}><div style={I}>
          <FadeIn><div style={{textAlign:'center',marginBottom:18}}><Pot phase="clay" size={48}/></div></FadeIn>
          <FadeIn delay={40}>
            <p style={{fontSize:13,color:C.ash,marginBottom:16,textAlign:'center',fontFamily:"'DM Sans',sans-serif"}}>What feels like the easiest place to start?</p>
          </FadeIn>

          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:20}}>
            {CARDS.map((c,i) => (
              <FadeIn key={i} delay={60+i*35}>
                <button onClick={()=>setSC(selC?.label===c.label?null:c)}
                  style={{width:'100%',textAlign:'left',padding:'12px 14px',borderRadius:14,border:`1.5px solid ${selC?.label===c.label?C.celadon:C.line}`,background:selC?.label===c.label?C.celadonP+'22':C.cream,cursor:'pointer',fontSize:14,fontFamily:"'DM Serif Display',Georgia,serif",color:C.charcoal,transition:'all 0.2s',boxShadow:C.glow}}>
                  {c.label}
                </button>
              </FadeIn>
            ))}
          </div>

          {selC && (
            <FadeIn key={selC.label}>
              <p style={{fontSize:12,color:C.ash,lineHeight:1.6,marginBottom:8,fontStyle:'italic',fontFamily:"'DM Sans',sans-serif"}}>{selC.nudge}</p>
              <TA value={story} onChange={setStory} placeholder="Write a few lines…" minH={130}/>
              <div style={{textAlign:'right',marginTop:10}}>
                <Btn onClick={async()=>{
                  setLd(true); setStage('stage1');
                  const raw = await demoAsk('s1');
                  if (raw.startsWith('[NEEDS_MORE]')) { setNm(true); setDR(raw.replace('[NEEDS_MORE]','').trim()); setS1(''); }
                  else { setNm(false); setS1(raw.replace('[READY]','').trim()); }
                  setLd(false);
                }} disabled={!story.trim()}>Continue</Btn>
              </div>
            </FadeIn>
          )}
        </div></div>
      );

      /* STAGE 1 */
      if (stage === 'stage1') return (
        <div style={W} ref={sr}><div style={I}>
          <FadeIn><div style={{textAlign:'center',marginBottom:16}}><Pot phase="shaped" size={48}/></div></FadeIn>
          <FadeIn><Progress stage={stage}/></FadeIn>
          {ld ? <Dots/> : nm ? (
            <>
              <FadeIn delay={50}>
                <div style={{background:C.cream,borderRadius:16,padding:16,boxShadow:C.glow,marginBottom:16,borderLeft:`3px solid ${C.terra}`,border:`1px solid ${C.line}`}}>
                  <p style={{fontSize:14,lineHeight:1.8,fontFamily:"'DM Sans',sans-serif"}}>{dR}</p>
                </div>
              </FadeIn>
              <FadeIn delay={120}>
                <TA value={dT} onChange={setDT} placeholder="Add a bit more…" minH={80}/>
                <div style={{textAlign:'right',marginTop:10}}>
                  <Btn onClick={async()=>{
                    setLd(true);
                    const combined = story + '\n\n' + dT; setStory(combined);
                    const raw = await demoAsk('deep');
                    setS1(raw.replace('[READY]','').trim());
                    setNm(false); setLd(false);
                  }} disabled={!dT.trim()}>Continue</Btn>
                </div>
              </FadeIn>
            </>
          ) : (
            <>
              <FadeIn delay={50}>
                <Tag>Listening</Tag>
                <div style={{background:C.cream,borderRadius:16,padding:16,boxShadow:C.glow,marginTop:8,marginBottom:16,borderLeft:`3px solid ${C.celadon}`,border:`1px solid ${C.line}`}}>
                  <p style={{fontSize:14,lineHeight:1.8,fontFamily:"'DM Sans',sans-serif"}}>{s1}</p>
                </div>
              </FadeIn>
              <FadeIn delay={120}>
                <TA value={focal} onChange={setFocal} placeholder="Respond here…" minH={80}/>
                <div style={{textAlign:'right',marginTop:10}}>
                  <Btn onClick={async()=>{
                    setLd(true); setStage('stage3');
                    const raw = await demoAsk('questions');
                    try { setRC(JSON.parse(raw.replace(/```json|```/g,'').trim())); }
                    catch { setRC([
                      {label:'Another side',question:"Have there been moments where this didn't quite fit?"},
                      {label:'The bigger picture',question:"Do any larger pressures come to mind?"},
                      {label:'A moment that didn\'t fit',question:"Was there a moment where something felt different?"},
                      {label:'What matters most',question:"What does this tell you about what you care about?"},
                    ]); }
                    setLd(false);
                  }} disabled={!focal.trim()}>Continue</Btn>
                </div>
              </FadeIn>
            </>
          )}
        </div></div>
      );

      /* STAGE 3 */
      if (stage === 'stage3') {
        const ans = Object.values(cR).filter(v => v?.trim()).length;
        return (
          <div style={W} ref={sr}><div style={I}>
            <FadeIn><div style={{textAlign:'center',marginBottom:16}}><Pot phase="bisque" size={48}/></div></FadeIn>
            <FadeIn><Progress stage={stage}/></FadeIn>
            {ld ? <Dots/> : (
              <>
                <FadeIn>
                  <Tag>Exploring</Tag>
                  <p style={{fontSize:13,lineHeight:1.55,marginTop:6,marginBottom:16,color:C.stone,fontFamily:"'DM Sans',sans-serif"}}>Take what resonates. Skip what doesn't.</p>
                </FadeIn>
                <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
                  {rC.map((c,i) => {
                    const op = oC === i, has = cR[c.label]?.trim();
                    return (
                      <FadeIn key={i} delay={40+i*35}>
                        <div style={{background:C.cream,borderRadius:16,border:`1.5px solid ${has?C.celadon:C.line}`,boxShadow:op?C.lift:C.glow,overflow:'hidden',transition:'all 0.2s'}}>
                          <button onClick={()=>setOC(op?null:i)}
                            style={{width:'100%',textAlign:'left',padding:'12px 14px',background:'transparent',border:'none',cursor:'pointer',fontFamily:"'DM Serif Display',Georgia,serif",display:'flex',alignItems:'center',gap:9}}>
                            <span style={{width:7,height:7,borderRadius:'50%',background:has?C.celadon:C.line,flexShrink:0,transition:'background 0.2s'}}/>
                            <span style={{fontSize:13,color:C.charcoal}}>{c.label}</span>
                            <span style={{marginLeft:'auto',fontSize:12,color:C.ash,transform:op?'rotate(180deg)':'',transition:'transform 0.2s'}}>▾</span>
                          </button>
                          {op && (
                            <div style={{padding:'0 14px 14px'}}>
                              <p style={{fontSize:12,color:C.ash,lineHeight:1.6,marginBottom:8,fontStyle:'italic',fontFamily:"'DM Sans',sans-serif"}}>{c.question}</p>
                              <TA value={cR[c.label]||''} onChange={v=>setCR({...cR,[c.label]:v})} placeholder="Write as much or as little as you'd like…" minH={65}/>
                            </div>
                          )}
                        </div>
                      </FadeIn>
                    );
                  })}
                </div>
                <FadeIn delay={200}>
                  <div style={{textAlign:'right'}}>
                    <Btn onClick={async()=>{
                      setLd(true); setStage('stage4');
                      const raw = await demoAsk('review');
                      try { setRvS(JSON.parse(raw.replace(/```json|```/g,'').trim())); }
                      catch { setRvS(['It seems like there is an important tension in what you shared.','Something may be shifting in how you understand this.']); }
                      setLd(false);
                    }} disabled={ans===0}>Continue</Btn>
                    {ans===0 && <p style={{fontSize:11,color:C.ash,marginTop:4,fontFamily:"'DM Sans',sans-serif"}}>Respond to at least one</p>}
                  </div>
                </FadeIn>
              </>
            )}
          </div></div>
        );
      }

      /* STAGE 4 */
      if (stage === 'stage4') {
        const done = rvS.length > 0 && rvS.every((_,i) => rvM[i]);
        return (
          <div style={W} ref={sr}><div style={I}>
            <FadeIn><div style={{textAlign:'center',marginBottom:16}}><Pot phase="glazed" size={48}/></div></FadeIn>
            <FadeIn><Progress stage={stage}/></FadeIn>
            {ld ? <Dots/> : (
              <>
                <FadeIn>
                  <Tag color={C.ochre}>Check-back</Tag>
                  <p style={{fontSize:13,lineHeight:1.55,marginTop:6,marginBottom:16,color:C.stone,fontFamily:"'DM Sans',sans-serif"}}>Does this feel right?</p>
                </FadeIn>
                <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
                  {rvS.map((st,i) => (
                    <FadeIn key={i} delay={40+i*35}>
                      <div style={{background:C.cream,borderRadius:16,padding:14,boxShadow:C.glow,border:`1.5px solid ${rvM[i]==='fits'?C.celadon:rvM[i]==='no'?C.terra:rvM[i]==='notquite'?C.ochre:C.line}`,transition:'border-color 0.2s'}}>
                        <p style={{fontSize:13,lineHeight:1.7,marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>{st}</p>
                        <div style={{display:'flex',gap:5}}>
                          {[{k:'fits',l:'✓ Fits',c:C.celadon},{k:'notquite',l:'~ Close',c:C.ochre},{k:'no',l:'✗ Remove',c:C.terra}].map(o => (
                            <button key={o.k} onClick={()=>setRvM({...rvM,[i]:o.k})}
                              style={{padding:'3px 10px',borderRadius:14,border:`1.5px solid ${rvM[i]===o.k?o.c:C.line}`,background:rvM[i]===o.k?o.c+'18':'transparent',color:rvM[i]===o.k?C.charcoal:C.ash,fontSize:11,fontFamily:"'DM Sans',sans-serif",cursor:'pointer',transition:'all 0.15s'}}>
                              {o.l}
                            </button>
                          ))}
                        </div>
                      </div>
                    </FadeIn>
                  ))}
                </div>
                <FadeIn delay={180}>
                  <div style={{textAlign:'right'}}>
                    <Btn onClick={()=>setStage('stage5')} disabled={!done}>Continue</Btn>
                  </div>
                </FadeIn>
              </>
            )}
          </div></div>
        );
      }

      /* STAGE 5 */
      if (stage === 'stage5') {
        return (
          <div style={W} ref={sr}><div style={I}>
            <FadeIn><div style={{textAlign:'center',marginBottom:16}}><Pot phase="glazed" size={48}/></div></FadeIn>
            <FadeIn><Progress stage={stage}/></FadeIn>
            <FadeIn>
              <Tag color={C.terra}>Your artifact</Tag>
              <p style={{fontSize:13,lineHeight:1.55,marginTop:6,marginBottom:18,color:C.stone,fontFamily:"'DM Sans',sans-serif"}}>Choose how you'd like this shaped.</p>
            </FadeIn>
            <div style={{display:'flex',flexDirection:'column',gap:9}}>
              {[
                {key:'reflective', label:'Looking back', icon:'◇', preview:'"You described… a tension emerged… the context of…"', color:C.celadon},
                {key:'firstperson', label:'In my words', icon:'✦', preview:'"I\'ve been… and what I\'m starting to see is…"', color:C.terra},
                {key:'values', label:'What matters now', icon:'◈', preview:'What seems important · what may be shifting · what stayed', color:C.ochre},
              ].map((o,i) => (
                <FadeIn key={o.key} delay={80+i*45}>
                  <button onClick={async()=>{
                    setOT(o.key); setLd(true); setStage('artifact');
                    const text = await demoAsk(o.key);
                    setOTx(text); setLd(false);
                  }}
                    style={{width:'100%',textAlign:'left',padding:0,borderRadius:16,border:`1.5px solid ${C.line}`,background:C.cream,cursor:'pointer',boxShadow:C.glow,fontFamily:"'DM Sans',sans-serif",transition:'all 0.2s',overflow:'hidden'}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=o.color}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=C.line}>
                    <div style={{height:3,background:`linear-gradient(to right, ${o.color}, ${o.color}33)`}}/>
                    <div style={{padding:'13px 14px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
                        <span style={{fontSize:12,color:o.color}}>{o.icon}</span>
                        <span style={{fontSize:14,fontFamily:"'DM Serif Display',Georgia,serif",color:C.charcoal}}>{o.label}</span>
                      </div>
                      <p style={{fontSize:11,color:C.ash,lineHeight:1.5,margin:0,fontStyle:'italic'}}>{o.preview}</p>
                    </div>
                  </button>
                </FadeIn>
              ))}
            </div>
          </div></div>
        );
      }

      /* ARTIFACT */
      if (stage === 'artifact') {
        const d = sd();
        return (
          <div style={W} ref={sr}><div style={I}>
            {ld ? <Dots/> : (
              <FadeIn>
                <Journey data={d} onEdit={t=>setOTx(t)} onExport={()=>dlF(expTxt(d),`reflection-${new Date().toISOString().slice(0,10)}.txt`)}/>
                <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:20}}>
                  <Btn onClick={async()=>{
                    const d2 = sd();
                    const id = await sv(d2);
                    if (id) setSvd(id);
                    setPast(await ldAll());
                    setStage('closing');
                  }}>{svd ? 'Saved ✓' : 'Save & finish'}</Btn>
                  <Btn v="secondary" onClick={()=>setStage('closing')}>Finish</Btn>
                </div>
              </FadeIn>
            )}
          </div></div>
        );
      }

      /* CLOSING */
      if (stage === 'closing') return (
        <div style={W} ref={sr}><div style={{...I,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'55vh'}}>
          <FadeIn>
            <div style={{textAlign:'center',maxWidth:320}}>
              <Pot phase="blooming" size={64}/>
              <p style={{fontSize:16,lineHeight:1.75,margin:'16px 0 6px'}}>This is yours.</p>
              <p style={{fontSize:13,lineHeight:1.55,color:C.stone,marginBottom:4,fontFamily:"'DM Sans',sans-serif"}}>To keep, to change, to come back to.</p>
              <Sep/>
              <p style={{fontSize:13,color:C.ash,marginBottom:22,fontFamily:"'DM Sans',sans-serif"}}>Thank you for this time.</p>
              <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
                <Btn v="secondary" onClick={()=>{reset();setStage('landing');}}>Home</Btn>
                {(svd || past.length > 0) && <Btn v="soft" onClick={()=>{setStage('history');setVw(null);}}>Past reflections</Btn>}
              </div>
            </div>
          </FadeIn>
        </div></div>
      );

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
